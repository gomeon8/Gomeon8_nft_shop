<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>NFT Подарки</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #000000; font-family: system-ui; padding: 20px 16px 40px; color: white; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px 12px; max-width: 900px; margin: 0 auto; }
        .gift-card { text-align: center; }
        .image-wrapper { background: #ffffff; border-radius: 24px; padding: 8px; margin-bottom: 12px; }
        .gift-img { width: 100%; aspect-ratio: 1 / 1; object-fit: cover; border-radius: 20px; display: block; }
        .gift-name { font-weight: 600; font-size: 15px; margin-bottom: 6px; }
        .gift-price { font-size: 16px; font-weight: 700; background: #a971c8; display: inline-block; padding: 4px 12px; border-radius: 40px; }
        .gift-price::before { content: "₽ "; }
        .gift-link { text-decoration: none; display: block; cursor: pointer; color: white; }
        .footer-note { text-align: center; margin-top: 40px; font-size: 13px; color: #aaa; border-top: 1px solid #222; padding-top: 24px; }
        @media (max-width: 560px) { .gift-name { font-size: 13px; } .gift-price { font-size: 14px; } }
    </style>
</head>
<body>

<div class="grid" id="nftGrid"></div>
<div class="footer-note">🔥 Нажми на картинку → откроется подарок в Telegram</div>

<script>
    const gifts = [
        {
            id: 1,
            name: "Vice Cream",
            price: 465,
            link: "https://t.me/nft/ViceCream-347944",
            imageUrl: "https://i.ibb.co/Mkv383Q6/IMG-20260425-122848-677.jpg"
        },
        {
            id: 2,
            name: "Instant Ramen",
            price: 525,
            link: "https://t.me/nft/InstantRamen-92332",
            imageUrl: "https://i.ibb.co/4nPN2rS1/Screenshot-20260425-142016-Telegram.jpg"
        },
        {
            id: 3,
            name: "Happy Brownie",
            price: 630,
            link: "https://t.me/nft/HappyBrownie-174834",
            imageUrl: "https://i.ibb.co/vxpnrYK4/IMG-20260425-160241-272.jpg"  
        },
        {
            id: 4,
            name: "Jingle Bells",
            price: 1290,
            link: "http://t.me/nft/JingleBells-28899",
            imageUrl: "https://i.ibb.co/h1YNmH8k/IMG-20260425-183559-003.jpg"  
        },
        {
            id: 5,
            name: "Chill Flame",
            price: 683,
            link: "https://t.me/nft/ChillFlame-197348",
            imageUrl: "https://i.ibb.co/Vpw6Cd7x/IMG-20260425-171429-926.jpg"
        },
        {
            id: 6,
            name: "Jingle Bells",
            price: 1710,
            link: "https://t.me/nft/JingleBells-40161",
            imageUrl: "https://i.ibb.co/8gZtKMQF/IMG-20260425-184216-883.jpg"
        },
        {
            id: 7,
            name: "Desk Calendar",
            price: 2257,
            link: "https://t.me/nft/DeskCalendar-233899",
            imageUrl: "https://i.ibb.co/fGChLYDq/IMG-20260425-184633-206.jpg"
        },
        {
            id: 8,
            name: "Victory Medal",
            price: 8100,
            link: "https://t.me/nft/VictoryMedal-12550",
            imageUrl: "https://i.ibb.co/SDcM2FmR/IMG-20260425-185100-731.jpg"
        },
        {
            id: 9,
            name: "Restless Jar",
            price: 4650,
            link: "https://t.me/nft/RestlessJar-43217",
            imageUrl: "https://i.ibb.co/xSGNT2CG/IMG-20260425-185541-193.jpg"
        }
        
    ];

    const container = document.getElementById('nftGrid');
    container.innerHTML = '';

    gifts.forEach(gift => {
        const card = document.createElement('div');
        card.className = 'gift-card';
        
        const a = document.createElement('a');
        a.href = gift.link;
        a.className = 'gift-link';
        a.target = '_blank';
        
        const wrapper = document.createElement('div');
        wrapper.className = 'image-wrapper';
        
        const img = document.createElement('img');
        img.className = 'gift-img';
        img.src = gift.imageUrl || "https://i.ibb.co/placeholder.jpg"; // Если нет картинки - покажет заглушку
        img.alt = gift.name;
        
        wrapper.appendChild(img);
        a.appendChild(wrapper);
        
        const nameDiv = document.createElement('div');
        nameDiv.className = 'gift-name';
        nameDiv.innerText = gift.name;
        
        const priceDiv = document.createElement('div');
        priceDiv.className = 'gift-price';
        priceDiv.innerText = gift.price;
        
        a.appendChild(nameDiv);
        a.appendChild(priceDiv);
        card.appendChild(a);
        container.appendChild(card);
    });
</script>
</body>
</html>
