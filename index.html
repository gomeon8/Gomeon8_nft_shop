<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>NFT Подарки | Каталог</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000000;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            padding: 20px 16px 40px 16px;
            color: white;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px 12px;
            max-width: 900px;
            margin: 0 auto;
        }

        .gift-card {
            background: transparent;
            border-radius: 0;
            text-align: center;
            transition: transform 0.1s ease;
        }

        .gift-card:active {
            transform: scale(0.98);
        }

        .image-wrapper {
            background: #ffffff;
            border-radius: 24px;
            padding: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 12px;
            box-shadow: 0 4px 12px rgba(255,255,255,0.05);
            position: relative;
            min-height: 150px;
        }

        .gift-image {
            width: 100%;
            aspect-ratio: 1 / 1;
            object-fit: contain;
            border-radius: 20px;
            display: block;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        }

        /* Загрузчик */
        .loader {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 30px;
            height: 30px;
            border: 3px solid rgba(255,255,255,0.2);
            border-top: 3px solid white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            0% { transform: translate(-50%, -50%) rotate(0deg); }
            100% { transform: translate(-50%, -50%) rotate(360deg); }
        }

        .gift-name {
            font-weight: 600;
            font-size: 15px;
            line-height: 1.3;
            color: white;
            margin-bottom: 6px;
            word-break: break-word;
        }

        .gift-price {
            font-size: 16px;
            font-weight: 700;
            color: white;
            background: rgba(255,255,255,0.08);
            display: inline-block;
            padding: 4px 12px;
            border-radius: 40px;
            backdrop-filter: blur(2px);
        }

        .gift-price::before {
            content: "₽ ";
            font-weight: 500;
        }

        .gift-link {
            text-decoration: none;
            display: block;
            cursor: pointer;
        }

        .footer-note {
            text-align: center;
            margin-top: 40px;
            font-size: 13px;
            color: #aaa;
            border-top: 1px solid #222;
            padding-top: 24px;
            max-width: 900px;
            margin-left: auto;
            margin-right: auto;
        }

        @media (max-width: 560px) {
            body {
                padding: 16px 12px 32px 12px;
            }
            .grid {
                gap: 16px 10px;
            }
            .gift-name {
                font-size: 13px;
            }
            .gift-price {
                font-size: 14px;
                padding: 3px 10px;
            }
            .image-wrapper {
                border-radius: 20px;
                padding: 6px;
            }
        }

        @media (max-width: 420px) {
            .gift-name {
                font-size: 12px;
            }
            .gift-price {
                font-size: 12px;
            }
        }

        @media (min-width: 1000px) {
            .grid {
                gap: 28px 20px;
            }
            .gift-name {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>

<div class="grid" id="nftGrid"></div>
<div class="footer-note">
    🔥 Нажми на подарок → откроется в Telegram с полной картинкой<br>
    Цены актуальны, наличие уточняй в канале
</div>

<script>
    // ============================================================
    // ЗДЕСЬ ТЫ МЕНЯЕШЬ ПОДАРКИ (ДОБАВЛЯЙ, УДАЛЯЙ, МЕНЯЙ ЦЕНЫ)
    // ============================================================
    const gifts = [
        {
            id: 1,
            name: "Vice Cream",
            price: 567,
            link: "https://t.me/nft/ViceCream-347944"
        },
        // Пример добавления второго подарка (раскомментируй и замени ссылку)
        // {
        //     id: 2,
        //     name: "Gold Star",
        //     price: 899,
        //     link: "https://t.me/nft/GoldStar-123456"
        // }
    ];

    // Функция получения реального изображения NFT из Telegram
    // Используем публичное API Telegram для получения предпросмотра
    async function getTelegramNFTImage(nftLink) {
        // Извлекаем ID подарка из ссылки t.me/nft/NAME-ID
        const match = nftLink.match(/t\.me\/nft\/([a-zA-Z0-9\-]+)/);
        if (!match) return null;
        
        const nftId = match[1];
        
        // Способ 1: Прямая ссылка на изображение через Telegram CDN
        // (работает для большинства NFT подарков)
        const possibleUrls = [
            `https://nft.telegram.org/api/piece/${nftId}/image?size=large`,
            `https://cdn.telegram.org/nft/${nftId}.jpg`,
            `https://t.me/nft/${nftId}/image`
        ];
        
        // Пробуем последовательно загрузить изображение
        for (const url of possibleUrls) {
            try {
                const imgTest = new Image();
                const loadPromise = new Promise((resolve, reject) => {
                    imgTest.onload = () => resolve(true);
                    imgTest.onerror = () => reject(false);
                    imgTest.src = url;
                });
                
                await loadPromise;
                return url;
            } catch(e) {
                continue;
            }
        }
        
        // Способ 2: Через Telegram Bot API (если первый не сработал)
        // Используем публичный метод без токена
        try {
            const proxyUrl = `https://api.telegram.org/bot/getFile?file_id=${nftId}`;
            // Это fallback для некоторых типов подарков
            return `https://t.me/nft/${nftId}/photo.jpg`;
        } catch(e) {
            return null;
        }
    }

    // Функция для создания карточки с автоматической загрузкой картинки
    async function renderCatalog() {
        const container = document.getElementById('nftGrid');
        if (!container) return;
        
        container.innerHTML = '';
        
        if (gifts.length === 0) {
            container.innerHTML = '<div style="color:white; text-align:center; grid-column:1/-1;">Нет подарков в наличии</div>';
            return;
        }
        
        // Для каждого подарка создаём карточку и загружаем изображение
        for (const gift of gifts) {
            const card = document.createElement('div');
            card.className = 'gift-card';
            
            const link = document.createElement('a');
            link.href = gift.link;
            link.className = 'gift-link';
            link.target = '_blank';
            link.rel = 'noopener noreferrer';
            
            const imgWrapper = document.createElement('div');
            imgWrapper.className = 'image-wrapper';
            
            // Показываем загрузчик
            const loader = document.createElement('div');
            loader.className = 'loader';
            imgWrapper.appendChild(loader);
            
            const img = document.createElement('img');
            img.className = 'gift-image';
            img.alt = gift.name;
            img.style.opacity = '0';
            
            // Пытаемся загрузить реальное изображение
            let imageLoaded = false;
            
            try {
                const realImageUrl = await getTelegramNFTImage(gift.link);
                if (realImageUrl) {
                    img.src = realImageUrl;
                    img.onload = () => {
                        img.style.opacity = '1';
                        loader.remove();
                        imageLoaded = true;
                    };
                    img.onerror = () => {
                        if (!imageLoaded) {
                            setFallbackImage(img, gift.name);
                            loader.remove();
                        }
                    };
                } else {
                    setFallbackImage(img, gift.name);
                    loader.remove();
                }
            } catch(e) {
                setFallbackImage(img, gift.name);
                loader.remove();
            }
            
            // Таймаут на случай долгой загрузки
            setTimeout(() => {
                if (!imageLoaded && loader.parentNode) {
                    setFallbackImage(img, gift.name);
                    loader.remove();
                }
            }, 5000);
            
            imgWrapper.appendChild(img);
            link.appendChild(imgWrapper);
            
            const nameSpan = document.createElement('div');
            nameSpan.className = 'gift-name';
            nameSpan.innerText = gift.name;
            link.appendChild(nameSpan);
            
            const priceSpan = document.createElement('div');
            priceSpan.className = 'gift-price';
            priceSpan.innerText = gift.price;
            link.appendChild(priceSpan);
            
            card.appendChild(link);
            container.appendChild(card);
        }
    }
    
    // Функция для установки красивой заглушки (на случай, если картинка не загрузилась)
    function setFallbackImage(img, name) {
        const iconMap = {
            'Vice Cream': '🍦',
            'Gold': '⭐',
            'Star': '⭐',
            'Ghost': '👻',
            'Neon': '🌈',
            'Cream': '🍨'
        };
        
        let icon = '🎁';
        for (const [key, value] of Object.entries(iconMap)) {
            if (name.includes(key)) {
                icon = value;
                break;
            }
        }
        
        img.src = `data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%231e1e2f'/%3E%3Ctext x='50' y='55' font-size='48' text-anchor='middle' fill='white' dy='.3em'%3E${icon}%3C/text%3E%3Ctext x='50' y='82' font-size='12' text-anchor='middle' fill='%23aaa'%3E${name}%3C/text%3E%3C/svg%3E`;
        img.style.opacity = '1';
    }
    
    // Запускаем отрисовку
    renderCatalog();
</script>
</body>
</html>
